apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: db-backups.stable.example.com
spec:
  group: stable.example.com
  scope: Namespaced
  names:
    plural: db-backups
    singular: db-backup
    kind: DbBackup
    shortNames:
      - dbb
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                database:
                  type: string
                destination:
                  type: string
