apiVersion: v1
kind: Pod
metadata:
  name: shared-pod
  namespace: volumes
spec:
  # 1. THE SHARED STOCKROOM (Volume Definition)
  volumes:
  - name: shared
    emptyDir: {}

  containers:
  # 2. THE WRITER (Primary Shopkeeper)
  - name: writer
    image: busybox:1.36
    command: ["sh", "-c", "while true; do date >> /data/out.log; sleep 2; done"]
    volumeMounts:
    - name: shared
      mountPath: /data

  # 3. THE READER (Sidecar Assistant)
  - name: reader
    image: busybox:1.36
    command: ["sh", "-c", "tail -f /data/out.log"]
    volumeMounts:
    - name: shared
      mountPath: /data
