apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-report
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: daily-report
            image: busybox
            command: ["/bin/sh", "-c", "date"]
          restartPolicy: OnFailure
